<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Murat & Nazlı – Özel Albüm</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #2d2a3e 0%, #1e1b2c 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    /* ana kart */
    .card {
      max-width: 500px;
      width: 100%;
      background: rgba(255, 248, 245, 0.9);
      backdrop-filter: blur(16px);
      background: #fef9f3;
      border-radius: 40px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 10px 20px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      transition: all 0.3s ease;
    }

    /* gizli / görünür içerik kontrolü */
    .hidden-section {
      display: none;
    }

    .visible-section {
      display: block;
    }

    /* giriş ekranı */
    .login-screen {
      padding: 40px 30px;
      text-align: center;
    }

    .lock-icon {
      font-size: 64px;
      margin-bottom: 20px;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.2));
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #4a3b4f;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      color: #7b6e82;
      font-size: 16px;
      margin-bottom: 30px;
      font-style: italic;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    input {
      width: 100%;
      max-width: 260px;
      padding: 15px 20px;
      border: 2px solid #e7d9d0;
      border-radius: 50px;
      font-size: 18px;
      text-align: center;
      letter-spacing: 4px;
      background: white;
      outline: none;
      transition: 0.2s;
      font-weight: 500;
      color: #3a2e3f;
    }

    input:focus {
      border-color: #c7aeb5;
      box-shadow: 0 0 0 4px rgba(199, 174, 181, 0.3);
    }

    button {
      background: #b48c7c;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 18px;
      padding: 14px 38px;
      border-radius: 40px;
      cursor: pointer;
      background: linear-gradient(135deg, #b1857a, #9b6e63);
      box-shadow: 0 10px 18px rgba(155, 110, 99, 0.4);
      transition: all 0.25s;
      letter-spacing: 1px;
      margin-top: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    button:hover {
      background: linear-gradient(135deg, #c49b8c, #aa7b6e);
      box-shadow: 0 14px 22px rgba(155, 110, 99, 0.55);
      transform: translateY(-2px);
    }

    .error-message {
      color: #c2544b;
      font-size: 15px;
      margin-top: 18px;
      font-weight: 500;
      min-height: 24px;
    }

    /* albüm ekranı */
    .album-screen {
      padding: 20px 25px 35px;
    }

    .album-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .album-title {
      font-size: 24px;
      font-weight: 680;
      color: #4e3948;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn {
      background: none;
      border: none;
      font-size: 16px;
      color: #7f6b78;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      border-radius: 30px;
      background: rgba(225, 210, 200, 0.5);
      transition: 0.2s;
      font-weight: 500;
    }

    .logout-btn:hover {
      background: rgba(200, 170, 160, 0.7);
      color: #3f2e38;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 20px 0 25px;
    }

    .photo-card {
      aspect-ratio: 1 / 1;
      background: #eadbcf;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
      transition: transform 0.25s ease, box-shadow 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f3e2d4, #ddcdbe);
    }

    .photo-card:hover {
      transform: scale(1.02);
      box-shadow: 0 18px 28px rgba(0, 0, 0, 0.3);
    }

    /* placeholder görseller (kalp, yıldız vs.) */
    .placeholder-img {
      font-size: 55px;
      opacity: 0.8;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.2));
    }

    .message-box {
      background: #f7efe7;
      border-radius: 32px;
      padding: 18px 20px;
      margin-top: 10px;
      color: #4d3b44;
      font-size: 16px;
      text-align: center;
      border: 1px solid #e6d2c4;
      font-style: italic;
      line-height: 1.5;
      box-shadow: inset 0 1px 5px rgba(0,0,0,0.05);
    }

    .signature {
      margin-top: 16px;
      font-weight: 600;
      color: #8b6f73;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 18px;
    }

    hr {
      border: 0.5px solid #e2cfc0;
      margin: 18px 0 10px;
    }

    @media (max-width: 400px) {
      .photo-grid {
        gap: 10px;
      }
      .album-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="card" id="appCard">
    <!-- GİRİŞ EKRANI -->
    <div id="loginSection" class="login-screen visible-section">
      <div class="lock-icon">🔐</div>
      <h1>Murat & Nazlı</h1>
      <p class="subtitle">Bu albüm sadece size özel</p>
      <div class="input-group">
        <input type="password" id="passwordInput" placeholder="••••••" maxlength="20" autocomplete="off">
        <button id="enterButton">📷 Albüme Gir</button>
      </div>
      <div id="errorMessage" class="error-message"></div>
      <div style="margin-top: 25px; font-size: 13px; color: #b8a59b;">🔒 özel şifre korumalı</div>
    </div>

    <!-- ALBÜM EKRANI (başlangıçta gizli) -->
    <div id="albumSection" class="album-screen hidden-section">
      <div class="album-header">
        <div class="album-title">
          <span>✨ Murat & Nazlı</span>
        </div>
        <button class="logout-btn" id="logoutButton">
          <span>🚪</span> Çıkış
        </button>
      </div>
      <div class="photo-grid">
        <div class="photo-card"><span class="placeholder-img">🌸</span></div>
        <div class="photo-card"><span class="placeholder-img">💫</span></div>
        <div class="photo-card"><span class="placeholder-img">🌙</span></div>
        <div class="photo-card"><span class="placeholder-img">🕊️</span></div>
      </div>
      <div class="message-box">
        “Birlikte geçen her an bir yıldız gibi… Bu albüm sadece ikinize ait.”
      </div>
      <hr>
      <div class="signature">
        <span>💛 Murat</span> <span style="margin:0 6px;">&</span> <span>Nazlı 💛</span>
      </div>
      <div style="text-align: center; font-size: 13px; margin-top: 14px; color: #ab8f87;">
        özel koleksiyon • izinsiz erişilemez
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- ÖZEL ŞİFRENİZİ BURAYA YAZIN ----------
      const OZEL_SIFRE = "MuratNazli2025"; 
      // (İsterseniz değiştirin. Büyük/küçük harf duyarlıdır.)

      // HTML elementleri
      const loginSection = document.getElementById('loginSection');
      const albumSection = document.getElementById('albumSection');
      const passwordInput = document.getElementById('passwordInput');
      const enterButton = document.getElementById('enterButton');
      const errorMessage = document.getElementById('errorMessage');
      const logoutButton = document.getElementById('logoutButton');

      // Sayfa yüklendiğinde, eğer daha önce doğru giriş yapıldıysa otomatik göster (opsiyonel)
      const albumAccess = sessionStorage.getItem('muratNazliAlbumAccess');
      if (albumAccess === 'granted') {
        showAlbum();
      } else {
        showLogin();
      }

      // Giriş butonu tıklama
      enterButton.addEventListener('click', function() {
        const girilenSifre = passwordInput.value.trim();
        if (girilenSifre === OZEL_SIFRE) {
          // Başarılı giriş
          sessionStorage.setItem('muratNazliAlbumAccess', 'granted');
          errorMessage.textContent = '';
          showAlbum();
        } else {
          errorMessage.textContent = '❌ Şifre yanlış. Lütfen tekrar deneyin.';
          passwordInput.value = '';
          passwordInput.focus();
        }
      });

      // Enter tuşu ile giriş
      passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          enterButton.click();
        }
      });

      // Çıkış butonu
      logoutButton.addEventListener('click', function() {
        sessionStorage.removeItem('muratNazliAlbumAccess');
        passwordInput.value = '';
        errorMessage.textContent = '';
        showLogin();
      });

      function showAlbum() {
        loginSection.classList.add('hidden-section');
        loginSection.classList.remove('visible-section');
        albumSection.classList.add('visible-section');
        albumSection.classList.remove('hidden-section');
      }

      function showLogin() {
        albumSection.classList.add('hidden-section');
        albumSection.classList.remove('visible-section');
        loginSection.classList.add('visible-section');
        loginSection.classList.remove('hidden-section');
        passwordInput.focus();
      }

      // Ek güvenlik: sayfa yeniden yüklendiğinde sessionStorage ile kalır, 
      // sekme kapanınca sıfırlanır. Başkaları aynı cihazda yeni sekmede şifresiz göremez.
    })();
  </script>
</body>
</html>
