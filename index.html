<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Murat & Nazlı – Özel Albüm</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #2d2a3e 0%, #1e1b2c 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    .card {
      max-width: 500px;
      width: 100%;
      background: #fef9f3;
      border-radius: 40px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 10px 20px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .hidden-section {
      display: none !important;
    }

    .visible-section {
      display: block;
    }

    .login-screen {
      padding: 40px 30px;
      text-align: center;
    }

    .lock-icon {
      font-size: 64px;
      margin-bottom: 20px;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.2));
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #4a3b4f;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      color: #7b6e82;
      font-size: 16px;
      margin-bottom: 30px;
      font-style: italic;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    input {
      width: 100%;
      max-width: 260px;
      padding: 15px 20px;
      border: 2px solid #e7d9d0;
      border-radius: 50px;
      font-size: 18px;
      text-align: center;
      letter-spacing: 4px;
      background: white;
      outline: none;
      transition: 0.2s;
      font-weight: 500;
      color: #3a2e3f;
    }

    input:focus {
      border-color: #c7aeb5;
      box-shadow: 0 0 0 4px rgba(199, 174, 181, 0.3);
    }

    button {
      background: linear-gradient(135deg, #b1857a, #9b6e63);
      border: none;
      color: white;
      font-weight: bold;
      font-size: 18px;
      padding: 14px 38px;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(155, 110, 99, 0.4);
      transition: all 0.25s;
      letter-spacing: 1px;
      margin-top: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    button:hover {
      background: linear-gradient(135deg, #c49b8c, #aa7b6e);
      box-shadow: 0 14px 22px rgba(155, 110, 99, 0.55);
      transform: translateY(-2px);
    }

    .error-message {
      color: #c2544b;
      font-size: 15px;
      margin-top: 18px;
      font-weight: 500;
      min-height: 24px;
    }

    .album-screen {
      padding: 20px 25px 35px;
    }

    .album-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .album-title {
      font-size: 24px;
      font-weight: 680;
      color: #4e3948;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn {
      background: rgba(225, 210, 200, 0.5);
      border: none;
      font-size: 16px;
      color: #7f6b78;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      border-radius: 30px;
      transition: 0.2s;
      font-weight: 500;
    }

    .logout-btn:hover {
      background: rgba(200, 170, 160, 0.7);
      color: #3f2e38;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 20px 0 25px;
    }

    .photo-card {
      aspect-ratio: 1 / 1;
      background: linear-gradient(145deg, #f3e2d4, #ddcdbe);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
      transition: transform 0.25s ease, box-shadow 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-card:hover {
      transform: scale(1.02);
      box-shadow: 0 18px 28px rgba(0, 0, 0, 0.3);
    }

    .placeholder-img {
      font-size: 55px;
      opacity: 0.8;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.2));
    }

    .message-box {
      background: #f7efe7;
      border-radius: 32px;
      padding: 18px 20px;
      margin-top: 10px;
      color: #4d3b44;
      font-size: 16px;
      text-align: center;
      border: 1px solid #e6d2c4;
      font-style: italic;
      line-height: 1.5;
    }

    .signature {
      margin-top: 16px;
      font-weight: 600;
      color: #8b6f73;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 18px;
    }

    hr {
      border: 0.5px solid #e2cfc0;
      margin: 18px 0 10px;
    }

    @media (max-width: 400px) {
      .photo-grid {
        gap: 10px;
      }
      .album-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="card" id="appCard">
    
    <!-- GİRİŞ EKRANI -->
    <div id="loginSection" class="login-screen visible-section">
      <div class="lock-icon">🔐</div>

        “Birlikte geçen her an bir yıldız gibi… Bu albüm sadece ikinize ait.”
      </div>
      <hr>
      <div class="signature">

  <script>
    (function() {
      // ==========================================
      // GÜVENLİ ŞİFRE SİSTEMİ
      // Aşağıda şifrenizin SHA-256 hash'i var.
      // Kaynak kodda gerçek şifre YOK.
      // ==========================================
      
      // Bu hash'i oluşturmak için kullanılan formül:
      // SHA256( "özel-tuz-değeri:" + GERÇEK-ŞİFRENİZ )
      // 
      // ÖRNEK: Eğer şifreniz "MuratNazli2025" ise hash şöyle oluştu:
      // SHA256("albüm-tuzu-2025:MuratNazli2025")
      // 
      // SİZ KENDİ ŞİFRENİZİ BELİRLEYİP YENİ HASH OLUŞTURMALISINIZ.
      // Aşağıdaki satırı kendi hash'inizle değiştirin.
      
      const SAKLANAN_HASH = "ea03769660bb11f74bd89ea6bfc8150784aec7439a1a53ec273109e7c77fd3de"; 
      // Bu örnek bir hash. GERÇEK hash'inizi koymalısınız!
      
      const TUZ = "albüm-tuzu-2025:";
      // Tuz değeri, aynı şifrenin farklı hash üretmesini sağlar.
      // İsterseniz tuz'u da değiştirebilirsiniz, ama hash ile uyumlu olmalı.
      
      // ==========================================
      // YENİ ŞİFRE VE HASH OLUŞTURMA TALİMATI:
      // ==========================================
      // 1. Şifrenizi belirleyin (örn: "BizimSifremiz2025")
      // 2. Aşağıdaki satırı konsolda çalıştırın (F12 > Console):
      //    async function hashOlustur() { const msg = new TextEncoder().encode("albüm-tuzu-2025:ŞİFRENİZ"); const hashBuffer = await crypto.subtle.digest("SHA-256", msg); const hashArray = Array.from(new Uint8Array(hashBuffer)); const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join(""); console.log("YENİ HASH:", hashHex); } hashOlustur();
      // 3. Çıkan hash'i yukarıdaki SAKLANAN_HASH değişkenine yapıştırın.
      // 4. "ŞİFRENİZ" yazan yere kendi şifrenizi yazın.
      
      // HTML elementleri
      const loginSection = document.getElementById('loginSection');
      const albumSection = document.getElementById('albumSection');
      const passwordInput = document.getElementById('passwordInput');
      const enterButton = document.getElementById('enterButton');
      const errorMessage = document.getElementById('errorMessage');
      const logoutButton = document.getElementById('logoutButton');

      // SHA-256 hash fonksiyonu (tarayıcıda çalışır)
      async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        return hashHex;
      }

      // Session kontrolü
      const albumAccess = sessionStorage.getItem('muratNazliAlbumGuvenli');
      if (albumAccess === 'granted') {
        showAlbum();
      } else {
        showLogin();
      }

      // Giriş butonu
      enterButton.addEventListener('click', async function() {
        const girilenSifre = passwordInput.value;
        
        if (!girilenSifre) {
          errorMessage.textContent = '⚠️ Lütfen şifre girin.';
          return;
        }

        // Tuzlu şifreyi hashle
        const tuzluSifre = TUZ + girilenSifre;
        const girisHash = await sha256(tuzluSifre);
        
        if (girisHash === SAKLANAN_HASH) {
          sessionStorage.setItem('muratNazliAlbumGuvenli', 'granted');
          errorMessage.textContent = '';
          passwordInput.value = '';
          showAlbum();
        } else {
          errorMessage.textContent = '❌ Şifre yanlış. Lütfen tekrar deneyin.';
          passwordInput.value = '';
          passwordInput.focus();
        }
      });

      // Enter tuşu
      passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          enterButton.click();
        }
      });

      // Çıkış
      logoutButton.addEventListener('click', function() {
        sessionStorage.removeItem('muratNazliAlbumGuvenli');
        passwordInput.value = '';
        errorMessage.textContent = '';
        showLogin();
      });

      function showAlbum() {
        loginSection.classList.add('hidden-section');
        loginSection.classList.remove('visible-section');
        albumSection.classList.add('visible-section');
        albumSection.classList.remove('hidden-section');
      }

      function showLogin() {
        albumSection.classList.add('hidden-section');
        albumSection.classList.remove('visible-section');
        loginSection.classList.add('visible-section');
        loginSection.classList.remove('hidden-section');
        passwordInput.focus();
      }

      // Güvenlik: console'da hash görüntülenmesin diye ekstra bir şey yok,
      // ama istenirse SAKLANAN_HASH değişkeni biraz daha gizlenebilir.
    })();
  </script>
</body>
